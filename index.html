<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>M3TM | RASED</title>
<style>
:root{--p:rgba(5,14,28,.34);--c:rgba(3,11,24,.24);--l:rgba(120,185,255,.28);--t:rgba(244,249,255,.9);--m:rgba(220,235,250,.62);--b:#58aaff;--fs:12px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font:var(--fs) Tahoma,Arial;color:var(--t);background:#01050d url('https://svs.gsfc.nasa.gov/vis/a030000/a030800/a030876/BlackMarble_2016_global_7km_print.jpg') center top/cover fixed no-repeat;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.7)),repeating-linear-gradient(90deg,rgba(120,190,255,.055) 0 1px,transparent 1px 92px),repeating-linear-gradient(0deg,rgba(120,190,255,.04) 0 1px,transparent 1px 92px);pointer-events:none}.app{position:relative;z-index:1;min-height:100vh;padding:18px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn,.nav button,.primary,.small{cursor:pointer;border:1px solid var(--l);border-radius:9px;background:var(--p);color:var(--t);font-weight:900;padding:8px 12px}.btn.main,.primary{background:linear-gradient(180deg,#338eff,#0c55be)}.badge{position:fixed;top:10px;left:10px;z-index:5;padding:5px 8px;border:1px solid var(--l);border-radius:9px;background:var(--p);color:var(--m);font-size:10px}.ctrl{position:fixed;left:10px;bottom:82px;z-index:6;width:100px;padding:6px;border:1px solid var(--l);border-radius:9px;background:rgba(5,14,28,.30);font-size:8px;opacity:.75}.ctrl input{width:100%;height:3px;accent-color:var(--b)}.date{color:var(--m);font-weight:800}.hero{min-height:34vh;display:flex;align-items:center;justify-content:center;text-align:center}.title{direction:ltr;margin:0;font-size:clamp(36px,7vw,82px);font-weight:1000;text-shadow:0 0 12px rgba(170,215,255,.85),0 0 32px rgba(80,145,255,.38)}.sub,.hint,.item small,.item p{color:var(--m)}.nav{position:fixed;right:14px;bottom:14px;z-index:4;display:flex;gap:7px;flex-wrap:wrap}.nav button.active,.nav button:hover{background:rgba(45,120,255,.5)}.panel{display:none;width:min(1060px,calc(100vw - 32px));margin:12px auto 76px;padding:13px;border:1px solid var(--l);border-radius:15px;background:var(--p)}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:9px}.card,.item{background:var(--c);border:1px solid var(--l);border-radius:13px;padding:11px}.field{width:100%;margin-top:7px;padding:9px;border-radius:9px;border:1px solid rgba(120,180,255,.22);background:rgba(0,0,0,.25);color:var(--t);outline:0;font-size:12px}.item{margin-top:9px;display:flex;justify-content:space-between;gap:9px}.chip{display:inline-block;margin:2px;padding:3px 7px;border-radius:999px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);font-size:10px}.high{background:rgba(255,176,32,.2)}.critical{background:rgba(255,77,98,.22)}.medium{background:rgba(88,170,255,.16)}.low{background:rgba(49,216,137,.13)}.small{font-size:10px;padding:5px 8px}.del{background:rgba(255,77,98,.5)}.copy{background:rgba(88,170,255,.24)}.world{height:500px;margin-top:9px;border-radius:13px;overflow:hidden;border:1px solid var(--l);background:rgba(0,0,0,.35)}iframe{width:100%;height:100%;border:0}@media(max-width:720px){:root{--fs:11px}body{background-size:auto 100vh;background-attachment:scroll}.top{display:block}.actions{display:grid;grid-template-columns:1fr 1fr;margin-top:42px}.btn{width:100%}.date{text-align:center;margin-top:7px}.ctrl{left:8px;bottom:78px;width:92px}.hero{min-height:30vh}.title{font-size:38px}.nav{position:static;display:grid;grid-template-columns:repeat(2,1fr);margin:10px 0}.panel{width:100%;margin:9px 0 14px}.grid{grid-template-columns:1fr}.item{display:block}.world{height:400px}}
</style></head>
<body><div class="badge" id="badge">m3tm.app</div><main class="app"><div class="ctrl"><label>شفافية</label><input type="range" min="24" max="55" value="34" oninput="setGlass(this.value)"><label>خط</label><input type="range" min="10" max="13" value="11" oninput="setFont(this.value)"></div><div class="top"><div class="actions"><button class="btn main" onclick="refreshUI()">↻ تحديث</button><button class="btn" id="loginBtn" onclick="login()">تسجيل دخول</button></div><div class="date"><span id="hijriDate">—</span> <span id="clock" style="direction:ltr;display:inline-block">--:--:--</span></div></div><section class="hero"><div><h1 class="title">M3™ - RASED</h1><div class="sub">منصة رصد سحابية بخريطة فضائية حقيقية</div></div></section><nav class="nav"><button class="active" onclick="openPanel('dashboard',this)">لوحة الرصد</button><button onclick="openPanel('news',this)">الأخبار</button><button onclick="openPanel('add',this)">إضافة</button><button onclick="openPanel('sources',this)">المصادر</button><button onclick="openPanel('world',this)">World Monitor</button><button onclick="exportData()">تصدير</button></nav><section id="dashboard" class="panel active"><h2>لوحة الرصد</h2><div class="grid"><div class="card"><h3>حالة النظام</h3><p id="status">تهيئة...</p></div><div class="card"><h3>الأخبار</h3><p id="itemsCount" style="font-size:20px;font-weight:900">0</p></div><div class="card"><h3>المصادر</h3><p id="sourcesCount" style="font-size:20px;font-weight:900">0</p></div><div class="card"><h3>آخر تحديث</h3><p id="lastUpdate">—</p></div></div></section><section id="news" class="panel"><h2>الأخبار والرصد</h2><input class="field" id="searchBox" placeholder="بحث..." oninput="render()"><div id="newsList"></div></section><section id="add" class="panel"><h2>إضافة خبر / رصد</h2><input class="field" id="newsTitle" placeholder="العنوان"><input class="field" id="newsSource" placeholder="المصدر"><input class="field" id="newsUrl" placeholder="الرابط"><select class="field" id="newsCategory"><option>حج</option><option>المدينة المنورة</option><option>باكستان</option><option>إيران</option><option>OSINT</option><option>أمن سيبراني</option><option>M3TM خاص</option></select><select class="field" id="newsImportance"><option>منخفض</option><option>متوسط</option><option>عالي</option><option>حرج</option></select><textarea class="field" id="newsNotes" placeholder="ملاحظات / ملخص"></textarea><button class="primary" onclick="addNews()">حفظ الخبر</button></section><section id="sources" class="panel"><h2>مكتبة المصادر</h2><input class="field" id="sourceName" placeholder="اسم المصدر"><input class="field" id="sourceUrl" placeholder="الرابط"><button class="primary" onclick="addSource()">إضافة مصدر</button><div id="sourcesList"></div></section><section id="world" class="panel"><h2>World Monitor</h2><input class="field" id="worldUrl" value="https://worldmonitor.example.com"><button class="primary" onclick="loadWorld()">تحميل</button><button class="primary" onclick="openWorldExternal()">فتح خارجي</button><div class="world"><iframe id="worldFrame" src="about:blank"></iframe></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script>
<script>
const K={n:'m3tm_news_cloud_v1',s:'m3tm_sources_cloud_v1'},$=id=>document.getElementById(id);let db,auth,user,cloud=false,news=[],sources=[];function local(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[]}}function store(k,v){localStorage.setItem(k,JSON.stringify(v))}function seed(){if(!localStorage.getItem(K.n))store(K.n,[{id:String(Date.now()),title:'تم تجهيز الربط السحابي',source:'M3TM System',url:'https://m3tm.app',category:'M3TM خاص',importance:'عالي',notes:'سجل دخول Google لتفعيل Firestore على كل الأجهزة.',timestamp:new Date().toISOString()}]);if(!localStorage.getItem(K.s))store(K.s,[{id:String(Date.now()+1),name:'مصدر تجريبي',url:'https://news.google.com',status:'غير مفعل'}]);news=local(K.n);sources=local(K.s)}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function openPanel(id,b){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b&&b.classList.add('active');render()}function tick(){let n=new Date();$('clock').textContent=n.toLocaleTimeString('ar-SA',{hour12:false});$('hijriDate').textContent=new Intl.DateTimeFormat('ar-SA-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(n)}setInterval(tick,1000);tick();function setGlass(v){document.documentElement.style.setProperty('--p',`rgba(5,14,28,${v/100})`);document.documentElement.style.setProperty('--c',`rgba(3,11,24,${Math.max(15,v-10)/100})`)}function setFont(v){document.documentElement.style.setProperty('--fs',v+'px')}function refreshUI(){render()}async function login(){if(!auth)return alert('Firebase غير جاهز');if(user){await auth.signOut();return}try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch(e){alert('فشل الدخول: '+e.message)}}async function addNews(){let title=$('newsTitle').value.trim(),source=$('newsSource').value.trim();if(!title||!source)return alert('اكتب العنوان والمصدر');let item={title,source,url:$('newsUrl').value.trim(),category:$('newsCategory').value,importance:$('newsImportance').value,notes:$('newsNotes').value.trim(),timestamp:new Date().toISOString(),owner:user?.email||'local'};if(cloud&&user)await db.collection('news').add(item);else{item.id=String(Date.now());news.unshift(item);store(K.n,news)}['newsTitle','newsSource','newsUrl','newsNotes'].forEach(id=>$(id).value='');render();openPanel('news',document.querySelectorAll('.nav button')[1])}async function delNews(id){if(!confirm('حذف الخبر؟'))return;if(cloud&&user&&id.length>14)await db.collection('news').doc(id).delete();else{news=news.filter(x=>x.id!==id);store(K.n,news);render()}}async function addSource(){let name=$('sourceName').value.trim(),url=$('sourceUrl').value.trim();if(!name||!url)return alert('اكتب اسم المصدر والرابط');let item={name,url,status:'غير مفعل',timestamp:new Date().toISOString(),owner:user?.email||'local'};if(cloud&&user)await db.collection('sources').add(item);else{item.id=String(Date.now());sources.unshift(item);store(K.s,sources)}$('sourceName').value='';$('sourceUrl').value='';render()}async function delSource(id){if(!confirm('حذف المصدر؟'))return;if(cloud&&user&&id.length>14)await db.collection('sources').doc(id).delete();else{sources=sources.filter(x=>x.id!==id);store(K.s,sources);render()}}function cls(v){return v==='حرج'?'critical':v==='عالي'?'high':v==='متوسط'?'medium':'low'}function render(){let q=($('searchBox')?.value||'').toLowerCase();$('itemsCount').textContent=news.length;$('sourcesCount').textContent=sources.length;$('lastUpdate').textContent=new Date().toLocaleString('ar-SA');$('newsList').innerHTML=news.filter(x=>(x.title+x.source+x.category+x.notes).toLowerCase().includes(q)).map(x=>`<div class="item"><div><strong>${esc(x.title)}</strong><p><span class="chip ${cls(x.importance)}">${esc(x.importance)}</span><span class="chip">${esc(x.category)}</span><span class="chip">${esc(x.source)}</span></p>${x.notes?`<p>${esc(x.notes)}</p>`:''}${x.url?`<a href="${esc(x.url)}" target="_blank">فتح المصدر</a>`:''}<br><small>${new Date(x.timestamp).toLocaleString('ar-SA')}</small></div><div><button class="small copy" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(x.title)}')">نسخ</button><button class="small del" onclick="delNews('${esc(x.id)}')">حذف</button></div></div>`).join('')||'<p class="hint">لا توجد أخبار.</p>';$('sourcesList').innerHTML=sources.map(x=>`<div class="item"><div><strong>${esc(x.name)}</strong><p>${esc(x.status)}</p><a href="${esc(x.url)}" target="_blank">${esc(x.url)}</a></div><button class="small del" onclick="delSource('${esc(x.id)}')">حذف</button></div>`).join('')||'<p class="hint">لا توجد مصادر.</p>'}function loadWorld(){$('worldFrame').src=$('worldUrl').value.trim()}function openWorldExternal(){open($('worldUrl').value.trim(),'_blank','noopener,noreferrer')}function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({news,sources,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'}));a.download='m3tm-rased-export.json';a.click()}function init(){seed();try{firebase.initializeApp(window.M3TM_FIREBASE_CONFIG);auth=firebase.auth();db=firebase.firestore();$('status').textContent='Firebase جاهز. سجل دخول Google للمزامنة.';$('badge').textContent='m3tm.app · Firebase ready';auth.onAuthStateChanged(u=>{user=u;$('loginBtn').textContent=u?'خروج · '+(u.email||'user'):'تسجيل دخول';cloud=!!u;if(u){$('status').textContent='متصل سحابيًا: '+u.email;db.collection('news').orderBy('timestamp','desc').onSnapshot(s=>{news=s.docs.map(d=>({id:d.id,...d.data()}));store(K.n,news);render()},e=>$('status').textContent='Firestore: '+e.message);db.collection('sources').orderBy('timestamp','desc').onSnapshot(s=>{sources=s.docs.map(d=>({id:d.id,...d.data()}));store(K.s,sources);render()})}else{$('status').textContent='غير مسجل دخول. يعمل محليًا الآن.';render()}})}catch(e){$('status').textContent='Firebase غير مفعّل: '+e.message;render()}}init();
</script></body></html>
