<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>M3TM | Login</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#01050d url('https://svs.gsfc.nasa.gov/vis/a030000/a030800/a030876/BlackMarble_2016_global_7km_print.jpg') center/cover fixed no-repeat;color:#eef7ff;font-family:Tahoma,Arial}
    body:before{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.78));pointer-events:none}
    .box{position:relative;width:min(520px,94vw);border:1px solid rgba(120,185,255,.35);border-radius:18px;background:rgba(3,11,24,.82);box-shadow:0 0 45px rgba(70,140,255,.25);padding:22px}
    .brand{direction:ltr;text-align:center;font-size:34px;font-weight:1000;text-shadow:0 0 16px rgba(170,215,255,.85);margin:0 0 8px}
    .sub{text-align:center;color:rgba(220,235,250,.72);margin-bottom:18px}
    .field{width:100%;margin:7px 0;padding:12px;border-radius:11px;border:1px solid rgba(120,180,255,.28);background:rgba(0,0,0,.28);color:#fff;outline:0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn{cursor:pointer;width:100%;margin-top:8px;border:1px solid rgba(120,185,255,.34);border-radius:11px;background:rgba(5,14,28,.55);color:#fff;font-weight:900;padding:12px}
    .btn.primary{background:linear-gradient(180deg,#338eff,#0c55be)}
    .msg{min-height:56px;margin-top:12px;color:rgba(220,235,250,.92);white-space:pre-wrap;font-size:13px;line-height:1.7}
    .diag{margin-top:10px;padding:10px;border-radius:12px;background:rgba(0,0,0,.25);text-align:right;color:rgba(220,235,250,.72);font-size:11px;direction:ltr;line-height:1.7;white-space:pre-wrap}
    .back{display:block;text-align:center;margin-top:14px;color:#9dccff;text-decoration:none}
  </style>
</head>
<body>
  <main class="box">
    <h1 class="brand">M3™ - RASED</h1>
    <div class="sub">نظام الدخول السحابي + التشخيص الذاتي</div>

    <button class="btn primary" id="googleBtn">الدخول عبر Google</button>

    <input class="field" id="email" type="email" placeholder="البريد الإلكتروني" autocomplete="email">
    <input class="field" id="password" type="password" placeholder="كلمة المرور" autocomplete="current-password">

    <div class="row">
      <button class="btn primary" id="emailLoginBtn">تسجيل الدخول</button>
      <button class="btn" id="registerBtn">إنشاء حساب</button>
    </div>

    <div class="msg" id="msg">جاهز للمصادقة...</div>
    <div class="diag" id="diag">loading diagnostics...</div>

    <a class="back" href="/">العودة إلى لوحة الرصد</a>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="loginLogic.js"></script>
</body>
</html>
