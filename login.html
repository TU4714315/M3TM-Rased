<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>M3TM | Login</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#01050d url('https://svs.gsfc.nasa.gov/vis/a030000/a030800/a030876/BlackMarble_2016_global_7km_print.jpg') center/cover fixed no-repeat;color:#eef7ff;font-family:Tahoma,Arial}body:before{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.78));pointer-events:none}.box{position:relative;width:min(460px,94vw);border:1px solid rgba(120,185,255,.35);border-radius:18px;background:rgba(3,11,24,.78);box-shadow:0 0 45px rgba(70,140,255,.25);padding:22px}.brand{direction:ltr;text-align:center;font-size:34px;font-weight:1000;text-shadow:0 0 16px rgba(170,215,255,.85);margin:0 0 8px}.sub{text-align:center;color:rgba(220,235,250,.72);margin-bottom:18px}.field{width:100%;margin:7px 0;padding:12px;border-radius:11px;border:1px solid rgba(120,180,255,.28);background:rgba(0,0,0,.28);color:#fff;outline:0}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{cursor:pointer;width:100%;margin-top:8px;border:1px solid rgba(120,185,255,.34);border-radius:11px;background:rgba(5,14,28,.55);color:#fff;font-weight:900;padding:12px}.btn.primary{background:linear-gradient(180deg,#338eff,#0c55be)}.msg{min-height:30px;margin-top:12px;color:rgba(220,235,250,.78);white-space:pre-wrap;font-size:13px}.back{display:block;text-align:center;margin-top:14px;color:#9dccff;text-decoration:none}.diag{margin-top:8px;text-align:center;color:rgba(220,235,250,.5);font-size:10px;direction:ltr}
  </style>
</head>
<body>
  <main class="box">
    <h1 class="brand">M3™ - RASED</h1>
    <div class="sub">تسجيل الدخول السحابي</div>
    <button class="btn primary" id="googleBtn">الدخول عبر Google</button>
    <input class="field" id="email" type="email" placeholder="البريد الإلكتروني">
    <input class="field" id="password" type="password" placeholder="كلمة المرور">
    <div class="row">
      <button class="btn primary" id="emailLoginBtn">تسجيل الدخول</button>
      <button class="btn" id="registerBtn">إنشاء حساب</button>
    </div>
    <div class="msg" id="msg"></div>
    <div class="diag" id="diag">auth build: e99df583</div>
    <a class="back" href="/">العودة إلى لوحة الرصد</a>
  </main>

  <script type="module">
    import { loginWithGoogle, loginWithEmail, registerWithEmail, auth } from './src/firebase/authService.js?v=e99df583';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { firebaseConfig } from './src/firebase/firebaseConfig.js?v=e99df583';

    const msg = document.getElementById('msg');
    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const diag = document.getElementById('diag');
    const setMsg = text => msg.textContent = text || '';
    diag.textContent = 'auth build: e99df583 | key: ' + firebaseConfig.apiKey.slice(0, 18) + '...' + firebaseConfig.apiKey.slice(-6);

    document.getElementById('googleBtn').onclick = async () => {
      setMsg('جاري تسجيل الدخول عبر Google...');
      const result = await loginWithGoogle();
      if (result.ok) location.href = '/?v=auth-success-e99df583';
      else setMsg(result.error);
    };

    document.getElementById('emailLoginBtn').onclick = async () => {
      if (!email.value || !password.value) return setMsg('اكتب البريد وكلمة المرور.');
      setMsg('جاري تسجيل الدخول...');
      const result = await loginWithEmail(email.value.trim(), password.value);
      if (result.ok) location.href = '/?v=auth-success-e99df583';
      else setMsg(result.error);
    };

    document.getElementById('registerBtn').onclick = async () => {
      if (!email.value || !password.value) return setMsg('اكتب البريد وكلمة المرور.');
      if (password.value.length < 6) return setMsg('كلمة المرور يجب ألا تقل عن 6 أحرف.');
      setMsg('جاري إنشاء الحساب...');
      const result = await registerWithEmail(email.value.trim(), password.value);
      if (result.ok) location.href = '/?v=auth-success-e99df583';
      else setMsg(result.error);
    };

    onAuthStateChanged(auth, user => {
      if (user) setMsg('مسجل دخول: ' + (user.email || user.uid));
    });
  </script>
</body>
</html>
