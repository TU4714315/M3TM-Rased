<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>M3TM | SARGE Agent</title>
<style>
:root{--bg:#05070d;--panel:rgba(8,14,26,.72);--card:rgba(255,255,255,.045);--line:rgba(255,138,31,.38);--text:#f4f7fb;--muted:#aab3c3;--accent:#ff8a1f;--blue:#58aaff;--green:#21d07a;--red:#ff4d62}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 22% 10%,rgba(255,138,31,.22),transparent 30%),radial-gradient(circle at 80% 30%,rgba(30,120,255,.16),transparent 30%),#04060b;color:var(--text);font-family:Tahoma,Arial,sans-serif}body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(90deg,rgba(255,138,31,.05) 0 1px,transparent 1px 72px),repeating-linear-gradient(0deg,rgba(88,170,255,.04) 0 1px,transparent 1px 72px);pointer-events:none}.wrap{position:relative;z-index:1;width:min(1180px,calc(100vw - 26px));margin:0 auto;padding:22px 0 70px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#ff7a00,#0b8fff);display:grid;place-items:center;box-shadow:0 0 40px rgba(255,122,0,.28);font-size:26px}.title h1{margin:0;font-size:26px}.title p{margin:5px 0 0;color:var(--muted)}.btn{cursor:pointer;border:1px solid rgba(255,255,255,.16);border-radius:12px;background:rgba(255,255,255,.06);color:var(--text);padding:10px 14px;font-weight:900}.btn.main{background:linear-gradient(180deg,#ff981f,#cc5a00);border-color:rgba(255,138,31,.55);color:#111}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.panel{border:1px solid var(--line);background:var(--panel);border-radius:22px;padding:16px;box-shadow:0 0 35px rgba(0,0,0,.35)}.prompt{min-height:190px;width:100%;resize:vertical;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(0,0,0,.26);color:var(--text);padding:16px;font-size:16px;line-height:1.8;outline:0}.row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-top:10px}.select,.input{border:1px solid rgba(255,255,255,.13);border-radius:12px;background:rgba(0,0,0,.24);color:var(--text);padding:10px 12px;outline:0}.select{min-width:150px}.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.13);border-radius:999px;background:rgba(255,255,255,.055);padding:6px 10px;margin:3px;color:var(--muted);font-size:12px}.chip.green{color:#8ff0bd;border-color:rgba(33,208,122,.34)}.chip.red{color:#ff9aa7;border-color:rgba(255,77,98,.34)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:12px}.card{border:1px solid rgba(255,255,255,.12);background:var(--card);border-radius:16px;padding:12px}.card h3{margin:0 0 8px;font-size:15px}.card p{margin:0;color:var(--muted);line-height:1.7}.out{white-space:pre-wrap;direction:ltr;text-align:left;background:#02050a;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:13px;min-height:260px;max-height:520px;overflow:auto;font-family:Consolas,monospace;font-size:12px;color:#dbe7ff}.links a{display:block;color:#8bc5ff;text-decoration:none;margin:7px 0;word-break:break-all}.case{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px;margin-top:8px;background:rgba(255,255,255,.035)}.case strong{display:block;margin-bottom:5px}.small{font-size:12px;color:var(--muted)}.danger{color:#ff9aa7}.ok{color:#8ff0bd}@media(max-width:850px){.grid{grid-template-columns:1fr}.top{display:block}.brand{margin-bottom:12px}.row .btn,.select,.input{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo">⌘</div><div class="title"><h1>M3TM SARGE-lite</h1><p>وكيل تحقيق آلي فوق M3TM-Rased · تصنيف · تشغيل مسارات · تقرير</p></div></div>
    <div class="row"><button class="btn" onclick="location.href='index.html'">لوحة RASED</button><button class="btn" onclick="exportAll()">تصدير كل الحالات</button></div>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>تشغيل الوكيل</h2>
      <textarea id="q" class="prompt" placeholder="ضع هنا: username أو email أو رقم هاتف أو domain أو URL أو وصف ملف. مثال: @example أو example@gmail.com أو example.com"></textarea>
      <div class="row">
        <select id="mode" class="select">
          <option value="auto">تحديد تلقائي</option>
          <option value="username">اسم مستخدم</option>
          <option value="email">بريد إلكتروني</option>
          <option value="phone">رقم هاتف</option>
          <option value="domain">نطاق / دومين</option>
          <option value="url">رابط</option>
          <option value="file">ملف / صورة</option>
        </select>
        <select id="depth" class="select">
          <option value="fast">سريع</option>
          <option value="deep" selected>عميق</option>
          <option value="case">تقرير قضية</option>
        </select>
        <button class="btn main" onclick="runAgent()">تشغيل آلي</button>
        <button class="btn" onclick="copyCommands()">نسخ أوامر Termux</button>
        <button class="btn" onclick="downloadReport('json')">JSON</button>
        <button class="btn" onclick="downloadReport('txt')">TXT</button>
      </div>
      <div class="cards">
        <div class="card"><h3>النوع</h3><p id="detType">—</p></div>
        <div class="card"><h3>المخاطر</h3><p id="risk">—</p></div>
        <div class="card"><h3>الثقة</h3><p id="confidence">—</p></div>
        <div class="card"><h3>الحالة</h3><p id="status">جاهز</p></div>
      </div>
    </section>

    <aside class="panel">
      <h2>روابط تشغيل مباشرة</h2>
      <div class="links" id="links"></div>
      <h2>الحالات السابقة</h2>
      <div id="history"></div>
    </aside>
  </div>

  <section class="panel" style="margin-top:14px">
    <h2>التقرير الآلي</h2>
    <div id="out" class="out">No run yet.</div>
  </section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const $=id=>document.getElementById(id);let db=null,auth=null,user=null,last=null;const LS='m3tm_sarge_cases_v1';
function now(){return new Date().toISOString()}
function loadCases(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch{return[]}}
function saveCases(v){localStorage.setItem(LS,JSON.stringify(v.slice(0,80)))}
function clean(v){return String(v||'').trim().replace(/^@/,'')}
function detect(raw){let v=String(raw||'').trim();let forced=$('mode').value;if(forced!=='auto')return forced;if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v))return 'email';if(/^\+?[0-9][0-9\s\-()]{6,}$/.test(v))return 'phone';if(/^https?:\/\//i.test(v))return 'url';if(/^[a-z0-9.-]+\.[a-z]{2,}$/i.test(v))return 'domain';if(/\.(jpg|jpeg|png|webp|pdf|docx|xlsx|mp4)$/i.test(v))return 'file';return 'username'}
function riskOf(t){return {username:'رمادي خفيف: نتائج عامة وتحتاج تحقق يدوي',email:'رمادي متوسط: لا تستخدمه ضد أشخاص بدون تصريح',phone:'حساس: لا يوجد تتبع مباشر ولا تحديد صاحب رقم',domain:'آمن نسبياً إذا كان النطاق لك أو مصرح',url:'تحليل رابط عام بدون استغلال',file:'تحليل Metadata فقط'}[t]||'—'}
function confidenceOf(t){return {username:'متوسطة إلى عالية عند وجود روابط مباشرة',email:'متوسطة: بعض النتائج إشارات وليست أدلة',phone:'منخفضة إلى متوسطة: triage فقط',domain:'عالية للأصول العامة DNS/WHOIS',url:'متوسطة حسب المصدر',file:'عالية للبيانات التقنية داخل الملف'}[t]||'—'}
function linksFor(type,value){let v=encodeURIComponent(value), raw=value;let arr=[];if(type==='username'){arr=[['Google exact','https://www.google.com/search?q=%22'+v+'%22'],['Google social','https://www.google.com/search?q=%22'+v+'%22+site%3Ainstagram.com+OR+site%3Atwitter.com+OR+site%3Ax.com+OR+site%3Atiktok.com'],['GitHub','https://github.com/search?q='+v+'&type=users'],['Reddit','https://www.reddit.com/search/?q='+v],['Namechk','https://namechk.com/'+raw]]}
if(type==='email'){arr=[['Google exact','https://www.google.com/search?q=%22'+v+'%22'],['GitHub code/users','https://github.com/search?q=%22'+v+'%22&type=code'],['HaveIBeenPwned','https://haveibeenpwned.com/']]} 
if(type==='phone'){arr=[['Google exact','https://www.google.com/search?q=%22'+v+'%22'],['Truecaller web','https://www.truecaller.com/search/'+v],['Sync.me','https://sync.me/search/?number='+v]]}
if(type==='domain'){arr=[['DNSdumpster','https://dnsdumpster.com/'],['crt.sh','https://crt.sh/?q='+v],['Google site search','https://www.google.com/search?q=site%3A'+v],['SecurityTrails','https://securitytrails.com/domain/'+raw+'/dns']]} 
if(type==='url'){arr=[['Google exact URL','https://www.google.com/search?q=%22'+v+'%22'],['VirusTotal URL','https://www.virustotal.com/gui/home/url'],['Wayback','https://web.archive.org/web/*/'+raw]]}
if(type==='file'){arr=[['ExifTool docs','https://exiftool.org/'],['VirusTotal','https://www.virustotal.com/gui/home/upload'],['Metadata2Go','https://www.metadata2go.com/']]}
return arr}
function commandsFor(type,value,depth){let v=value.replace(/"/g,'\\"');let deep=depth!=='fast';let cmds=[];cmds.push('mkdir -p ~/osint-reports/m3tm_'+Date.now());if(type==='username'){cmds.push('source ~/venvs/maigret/bin/activate && maigret "'+v+'" '+(deep?'-a':'--top-sites 100')+' --html --json ndjson --folderoutput ~/osint-reports/maigret_'+v);cmds.push('source ~/venvs/sherlock/bin/activate && sherlock "'+v+'" --csv --txt --folderoutput ~/osint-reports/sherlock_'+v)}
if(type==='email'){cmds.push('source ~/venvs/holehe/bin/activate && holehe "'+v+'" | tee ~/osint-reports/holehe_'+v.replace(/[^a-zA-Z0-9]/g,'_')+'.txt');cmds.push('source ~/venvs/ghunt/bin/activate && ghunt email "'+v+'" --json ~/osint-reports/ghunt_'+v.replace(/[^a-zA-Z0-9]/g,'_')+'.json')}
if(type==='phone'){cmds.push('python ~/osint-tools/phone_parse.py "'+v+'" | tee ~/osint-reports/phone_parse.txt');cmds.push('cd ~/osint-tools/PhoneInfoga && ./phoneinfoga scan -n "'+v+'" | tee ~/osint-reports/phoneinfoga.txt')}
if(type==='domain'){cmds.push('whois "'+v+'" > ~/osint-reports/whois_'+v+'.txt');cmds.push('dig "'+v+'" ANY > ~/osint-reports/dig_'+v+'.txt');cmds.push('subfinder -d "'+v+'" '+(deep?'-all ':'')+'-o ~/osint-reports/subfinder_'+v+'.txt');cmds.push('cat ~/osint-reports/subfinder_'+v+'.txt | httpx -title -status-code -tech-detect -o ~/osint-reports/httpx_'+v+'.txt')}
if(type==='url'){cmds.push('curl -I "'+v+'" | tee ~/osint-reports/url_headers.txt');cmds.push('python - <<\'PY\'\nfrom urllib.parse import urlparse\nu="'+v+'"\nprint(urlparse(u))\nPY')}
if(type==='file'){cmds.push('exiftool "'+v+'" > ~/osint-reports/file_metadata.txt')}
return cmds}
function buildReport(type,value,depth){let links=linksFor(type,value),cmds=commandsFor(type,value,depth);return {id:'case_'+Date.now(),createdAt:now(),input:value,type,depth,risk:riskOf(type),confidence:confidenceOf(type),links:links.map(x=>({title:x[0],url:x[1]})),commands:cmds,notes:['النتائج مؤشرات OSINT وليست إثبات هوية بمفردها.','استخدم الأدوات فقط على أصولك أو ضمن تصريح قانوني.','راجع كل رابط يدوياً قبل إدخاله في تقرير نهائي.']}}
async function runAgent(){let raw=$('q').value.trim();if(!raw)return alert('أدخل قيمة للتحليل');let type=detect(raw),value=clean(raw),depth=$('depth').value;$('status').textContent='يعمل...';let report=buildReport(type,value,depth);last=report;$('detType').textContent=type;$('risk').textContent=report.risk;$('confidence').textContent=report.confidence;$('links').innerHTML=report.links.map(l=>`<a target="_blank" rel="noopener noreferrer" href="${l.url}">↗ ${l.title}</a>`).join('');$('out').textContent=JSON.stringify(report,null,2);let cases=loadCases();cases.unshift(report);saveCases(cases);renderHistory();try{if(db&&user)await db.collection('agent_cases').doc(report.id).set(report)}catch(e){console.warn(e)}$('status').textContent='اكتمل'}
function renderHistory(){let cases=loadCases();$('history').innerHTML=cases.slice(0,8).map(c=>`<div class="case"><strong>${c.type}: ${c.input}</strong><div class="small">${new Date(c.createdAt).toLocaleString('ar-SA')}</div><button class="btn" onclick="loadCase('${c.id}')">فتح</button></div>`).join('')||'<p class="small">لا توجد حالات</p>'}
function loadCase(id){let c=loadCases().find(x=>x.id===id);if(!c)return;last=c;$('q').value=c.input;$('mode').value=c.type;$('depth').value=c.depth;$('detType').textContent=c.type;$('risk').textContent=c.risk;$('confidence').textContent=c.confidence;$('links').innerHTML=c.links.map(l=>`<a target="_blank" rel="noopener noreferrer" href="${l.url}">↗ ${l.title}</a>`).join('');$('out').textContent=JSON.stringify(c,null,2)}
function copyCommands(){if(!last)return alert('شغل الوكيل أولاً');navigator.clipboard.writeText(last.commands.join('\n')).then(()=>$('status').textContent='تم نسخ أوامر Termux')}
function downloadReport(fmt){if(!last)return alert('لا يوجد تقرير');let text=fmt==='json'?JSON.stringify(last,null,2):['M3TM SARGE-lite Report','Input: '+last.input,'Type: '+last.type,'Risk: '+last.risk,'Confidence: '+last.confidence,'','Links:',...last.links.map(l=>'- '+l.title+': '+l.url),'','Commands:',...last.commands.map(c=>'$ '+c)].join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download='m3tm-agent-'+last.id+'.'+(fmt==='json'?'json':'txt');a.click()}
function exportAll(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(loadCases(),null,2)],{type:'application/json'}));a.download='m3tm-agent-cases.json';a.click()}
async function init(){renderHistory();try{firebase.initializeApp(window.M3TM_FIREBASE_CONFIG);auth=firebase.auth();db=firebase.firestore();auth.onAuthStateChanged(u=>{user=u;$('status').textContent=u?'متصل Firestore: '+u.email:'محلي فقط - سجل من RASED للحفظ السحابي'})}catch(e){$('status').textContent='محلي فقط: '+e.message}}
init();
</script>
</body>
</html>
