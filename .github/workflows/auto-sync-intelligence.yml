name: Auto Sync Intelligence Sources

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m3tm-rased-intelligence-sync
  cancel-in-progress: true

env:
  PROJECT_ID: m3tm-rased-07246627-7b0bf
  NEWS_DEFAULT_LANGUAGE: ar
  ARABIC_NEWS_ENABLED: 'true'
  GREY_INTEL_ENABLED: 'true'
  ENABLE_LEAK_METADATA_ONLY: 'true'
  ENABLE_DARKWEB_DIRECT_ACCESS: 'false'
  ENABLE_PRIVATE_SOURCE_SCRAPING: 'false'

jobs:
  sync:
    name: Sync Arabic intelligence feeds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Firebase service account secret exists
        run: |
          if [ -z '${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}' ]; then
            echo 'Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_M3TM_RASED'
            exit 1
          fi

      - name: Write Firebase credentials
        run: |
          cat > "$RUNNER_TEMP/firebase-key.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
          EOF
          chmod 600 "$RUNNER_TEMP/firebase-key.json"

      - name: Sync intelligence sources
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: npm run sync:intelligence
