name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"
      - run: npm ci
      - run: npm run verify:firebase-config
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run test:rules
      - run: node --check server/index.mjs
      - run: node --check scripts/sync-intelligence.mjs
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
