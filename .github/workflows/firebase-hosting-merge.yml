name: Deploy M3TM RASED to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write Firebase service account
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
          EOF

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only firestore:rules --project m3tm-rased-07246627-7b0bf --non-interactive

      - name: Deploy Firebase Hosting live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
          projectId: m3tm-rased-07246627-7b0bf
          channelId: live
