name: Build and deploy M3TM RASED

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: "21"
      - run: npm ci
      - run: npm run verify:firebase-config
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run test:rules
      - run: node --check server/index.mjs
      - run: node --check scripts/sync-intelligence.mjs
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/configure-pages@v6
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: dist
      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: production-dist
          path: dist

  firebase:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: production-dist
          path: dist
      - name: Authenticate Firebase deployment
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
      - name: Deploy Firestore rules
        run: node scripts/deploy-firestore-rules.mjs
        env:
          FIREBASE_PROJECT_ID: m3tm-rased-07246627-7b0bf
      - name: Deploy Firestore indexes
        continue-on-error: true
        run: node scripts/deploy-firestore-indexes.mjs
        env:
          FIREBASE_PROJECT_ID: m3tm-rased-07246627-7b0bf
      - uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
          projectId: m3tm-rased-07246627-7b0bf
          channelId: live

  github-pages:
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy backup site
        id: deployment
        uses: actions/deploy-pages@v5
