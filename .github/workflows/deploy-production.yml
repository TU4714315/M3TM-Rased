name: Build and deploy M3TM RASED

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write
  pull-requests: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run test:rules
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist
      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: production-dist
          path: dist

  firebase:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - name: Authenticate Firebase deployment
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
      - name: Deploy Firestore rules and indexes
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project m3tm-rased-07246627-7b0bf --non-interactive
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_M3TM_RASED }}
          projectId: m3tm-rased-07246627-7b0bf
          channelId: live

  github-pages:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy backup site
        id: deployment
        uses: actions/deploy-pages@v4
