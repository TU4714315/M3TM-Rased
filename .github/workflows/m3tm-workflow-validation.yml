name: M3TM Workflow Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - lovable-sync
      - "lovable/**"
      - "staging/**"
      - "release/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: m3tm-workflow-validation-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PRODUCTION_URL: "https://m3tm.app"
  ALLOWED_PR_SOURCE_BRANCHES: "^(lovable-sync|lovable/.+|staging/.+|release/.+|hotfix/.+|ops/.+)$"

jobs:
  workflow-gate:
    name: workflow-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enforce PR path into main
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          HEAD_BRANCH="${{ github.head_ref }}"
          BASE_BRANCH="${{ github.base_ref }}"

          echo "Head branch: ${HEAD_BRANCH}"
          echo "Base branch: ${BASE_BRANCH}"

          if [[ "${BASE_BRANCH}" != "main" ]]; then
            echo "This gate only applies to PRs targeting main."
            exit 0
          fi

          if [[ ! "${HEAD_BRANCH}" =~ ${ALLOWED_PR_SOURCE_BRANCHES} ]]; then
            echo "::error::PRs targeting main must come from lovable-sync, lovable/*, staging/*, release/*, hotfix/*, or ops/*."
            exit 1
          fi

      - name: Block draft PRs from production path
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == true
        shell: bash
        run: |
          echo "::error::Draft PRs cannot enter the production path. Mark the PR ready first."
          exit 1

      - name: Confirm gate result
        shell: bash
        run: |
          echo "Workflow gate passed."

  repository-validation:
    name: repository-validation
    runs-on: ubuntu-latest
    needs:
      - workflow-gate
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm required project files
        shell: bash
        run: |
          set -euo pipefail

          test -f package.json || { echo "::error::package.json is required."; exit 1; }
          test -f package-lock.json || { echo "::error::package-lock.json is required for deterministic npm ci."; exit 1; }
          test -f firebase.json || { echo "::error::firebase.json is required for hosting configuration validation."; exit 1; }

          node -e "const pkg=require('./package.json'); const required=['build','lint','test','verify:firebase-config']; for (const script of required) { if (!pkg.scripts || !pkg.scripts[script]) { console.error('Missing script: ' + script); process.exit(1); } }"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java for Firebase emulator checks
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Verify Firebase web configuration
        shell: bash
        run: npm run verify:firebase-config

      - name: Dependency audit
        shell: bash
        run: npm audit --audit-level=high

      - name: Lint
        shell: bash
        run: npm run lint

      - name: Unit tests
        shell: bash
        run: npm test

      - name: Firestore rules tests
        shell: bash
        run: npm run test:rules

      - name: Syntax checks for runtime scripts
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f server/index.mjs ]]; then
            node --check server/index.mjs
          fi

          if [[ -f scripts/sync-intelligence.mjs ]]; then
            node --check scripts/sync-intelligence.mjs
          fi

          if [[ -f scripts/sync-feeds.mjs ]]; then
            node --check scripts/sync-feeds.mjs
          fi

      - name: Production build
        shell: bash
        run: npm run build

      - name: Validate build output
        shell: bash
        run: |
          set -euo pipefail

          test -d dist || { echo "::error::dist directory was not created."; exit 1; }
          test -f dist/index.html || { echo "::error::dist/index.html is missing."; exit 1; }

      - name: Upload validated build artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3tm-validated-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 7

  e2e-validation:
    name: e2e-validation
    runs-on: ubuntu-latest
    needs:
      - repository-validation
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Install browser runtime
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        shell: bash
        run: npm run test:e2e

  production-health:
    name: production-health
    runs-on: ubuntu-latest
    needs:
      - e2e-validation
    timeout-minutes: 5

    steps:
      - name: Check production availability
        shell: bash
        run: |
          set -euo pipefail

          status_code="$(curl -L -sS -o /tmp/m3tm-production.html -w "%{http_code}" --retry 3 --retry-delay 5 "${PRODUCTION_URL}")"

          echo "Production URL: ${PRODUCTION_URL}"
          echo "HTTP status: ${status_code}"

          if [[ "${status_code}" -lt 200 || "${status_code}" -ge 400 ]]; then
            echo "::error::Production health check failed with HTTP status ${status_code}."
            exit 1
          fi

          if [[ ! -s /tmp/m3tm-production.html ]]; then
            echo "::error::Production response body is empty."
            exit 1
          fi

          echo "Production health check passed."
