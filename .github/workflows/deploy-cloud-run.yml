name: Deploy Cloud Run

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-run-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUD_RUN_REGION: us-central1
  CLOUD_RUN_SERVICE: m3tm-intelligence-api

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Enable deployment services
        run: >
          gcloud services enable
          run.googleapis.com
          cloudbuild.googleapis.com
          artifactregistry.googleapis.com
          --project "${{ secrets.GCP_PROJECT_ID }}"
          --quiet
      - name: Deploy API
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SCHEDULER_SECRET: ${{ secrets.SCHEDULER_SECRET }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --region "$CLOUD_RUN_REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --set-env-vars "^@^FIREBASE_PROJECT_ID=$PROJECT_ID@ALLOWED_ORIGINS=https://m3tm.app,https://m3tm-rased-07246627-7b0bf.web.app@NEWS_DEFAULT_LANGUAGE=ar@ARABIC_NEWS_ENABLED=true@GREY_INTEL_ENABLED=true@ENABLE_LEAK_METADATA_ONLY=true@ENABLE_DARKWEB_DIRECT_ACCESS=false@ENABLE_PRIVATE_SOURCE_SCRAPING=false@SCHEDULER_SECRET=$SCHEDULER_SECRET" \
            --quiet
      - name: Verify health endpoint
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          service_url="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$CLOUD_RUN_REGION" \
            --project "$PROJECT_ID" \
            --format='value(status.url)')"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "$service_url/health"
